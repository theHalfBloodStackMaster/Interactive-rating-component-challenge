<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./index.css">
  
  <title>Frontend Mentor | Interactive rating component</title>

</head>
<body>
  <main>
    <div class="card" id="rating-card">
      <div class="star-icon">
        <img src="./assets/images/icon-star.svg" alt="">
        </div>
        <h1>How did we do?</h1>
        <p>Please let us know how we did with your support request. All feedback is appreciated 
        to help us improve our offering!</p>
        <div class="rating">
        <button class="rating_button" type="button">1</button>
        <button class="rating_button" type="button">2</button>
        <button class="rating_button" type="button">3</button>
        <button class="rating_button" type="button">4</button>
        <button class="rating_button" type="button">5</button>
      </div>
      <button class="submit_button" disabled type="button">SUBMIT</button>
    </div>
    <div class="card" id="thank-you-card" hidden>
      <div class="thank-you">
        <img src="./assets/images/illustration-thank-you.svg" alt="">
        <p class="selected-rating"
        ></p>
        <h1>Thank you!</h1>
        <p>
        We appreciate you taking the time to give a rating. If you ever need more support, don’t hesitate to get in touch!</p>
      </div>
    </div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
